<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chương 1137 — CuongDeBachMyDuyen</title>
<style>

/* ── Google Fonts ─────────────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap');

/* ── CSS Variables ────────────────────────────────────────────── */
:root {
  --bg:          #0f0e17;
  --bg2:         #1a1826;
  --bg3:         #252336;
  --surface:     #1e1c2e;
  --border:      #2e2b45;
  --accent:      #e8c547;
  --accent2:     #c97d4e;
  --text:        #e2dff0;
  --text-muted:  #8b87a8;
  --text-dim:    #5a5674;
  --serif:       'Lora', 'Crimson Pro', Georgia, serif;
  --mono:        'Space Mono', monospace;
  --radius:      10px;
  --shadow:      0 8px 32px rgba(0,0,0,.45);
  --transition:  .22s cubic-bezier(.4,0,.2,1);
  /* reader overrides (JS-controlled) */
  --reader-font-size: 1.15rem;
  --reader-line-height: 1.9;
  --reader-max-width: 720px;
}
[data-theme="light"] {
  --bg:         #faf8f2;
  --bg2:        #f0ede3;
  --bg3:        #e8e3d5;
  --surface:    #ffffff;
  --border:     #d6d0c0;
  --accent:     #b5860d;
  --accent2:    #a0522d;
  --text:       #1c1a14;
  --text-muted: #6b6555;
  --text-dim:   #9e9580;
}
[data-theme="sepia"] {
  --bg:         #f4efe6;
  --bg2:        #ece5d8;
  --bg3:        #e2d9c8;
  --surface:    #fdf6ec;
  --border:     #c9bfa8;
  --accent:     #8b6914;
  --accent2:    #7a4010;
  --text:       #2c2416;
  --text-muted: #6e5c3e;
  --text-dim:   #a8987c;
}

/* ── Reset & Base ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--serif);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  line-height: 1.6;
}
a { color: var(--accent); text-decoration: none; transition: opacity var(--transition); }
a:hover { opacity: .75; }

/* ── Scrollbar ────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ── Top bar ──────────────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: .65rem 1.5rem;
  display: flex; align-items: center; gap: 1rem;
  backdrop-filter: blur(12px);
}
.topbar-title {
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-title a { color: var(--text-muted); }
.topbar-title a:hover { color: var(--accent); opacity: 1; }

/* ── Buttons ──────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .45rem .9rem;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .06em;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
}
.btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); opacity: 1; }
.btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
.btn-icon { padding: .45rem .6rem; }


/* ── Reader controls ─────────────────────────────────────────── */
.reader-bar {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
  padding: .5rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.reader-bar label {
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--text-dim);
  letter-spacing: .08em;
  margin-right: .2rem;
}
input[type=range] {
  -webkit-appearance: none;
  width: 90px;
  height: 4px;
  border-radius: 99px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--accent);
}

/* ── Article ─────────────────────────────────────────────────── */
.chapter-wrap {
  max-width: var(--reader-max-width);
  margin: 0 auto;
  padding: 3rem 1.5rem 6rem;
}
.chapter-title {
  font-family: 'Crimson Pro', var(--serif);
  font-weight: 300;
  font-size: 2rem;
  letter-spacing: -.01em;
  color: var(--text);
  margin-bottom: 2.5rem;
  padding-bottom: 1.2rem;
  border-bottom: 1px solid var(--border);
}
.chapter-title small {
  display: block;
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: .5rem;
}
.chapter-body p {
  font-size: var(--reader-font-size);
  line-height: var(--reader-line-height);
  color: var(--text);
  margin-bottom: 1.1em;
  text-align: justify;
  hyphens: auto;
}

/* ── Nav ─────────────────────────────────────────────────────── */
.chapter-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}
.nav-btn {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  padding: .7rem 1.2rem;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: .05em;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg3); opacity: 1; }
.nav-btn.disabled { opacity: .25; pointer-events: none; }
.nav-home {
  font-family: var(--mono);
  font-size: .7rem;
  color: var(--text-dim);
}
.nav-home:hover { color: var(--accent); opacity: 1; }

/* ── Progress bar ────────────────────────────────────────────── */
.progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  background: var(--accent);
  width: 0%;
  transition: width .1s;
  z-index: 200;
}

/* ── Theme row ───────────────────────────────────────────────── */
.theme-row { display: flex; gap: .4rem; margin-left: auto; }
</style>
</head>
<body>
<div class="progress-bar" id="progress"></div>

<div class="topbar">
  <span class="topbar-title"><a href="index.html">CuongDeBachMyDuyen</a> / Chương 1137</span>
  <div class="theme-row">
    <button class="btn btn-icon" onclick="setTheme('dark')"  title="Dark">🌙</button>
    <button class="btn btn-icon" onclick="setTheme('sepia')" title="Sepia">📜</button>
    <button class="btn btn-icon" onclick="setTheme('light')" title="Light">☀️</button>
  </div>
</div>

<div class="reader-bar">
  <label>CỠ CHỮ</label>
  <input type="range" min="14" max="24" value="18" oninput="setFontSize(this.value)">
  <label style="margin-left:.8rem;">DÃN DÒNG</label>
  <input type="range" min="150" max="220" value="190" oninput="setLineHeight(this.value)">
  <label style="margin-left:.8rem;">ĐỘ RỘNG</label>
  <input type="range" min="500" max="900" value="720" oninput="setWidth(this.value)">
</div>

<div class="chapter-wrap">
  <h1 class="chapter-title">
    <small>Chương 1137</small>
    Chương 1137
  </h1>
  <div class="chapter-body">
    <p>Tôi xin lỗi, nhưng tôi không thể đáp ứng yêu cầu này. Tôi không tạo ra, biên tập hoặc chỉnh sửa nội dung khiêu dâm, tình dục rõ ràng hoặc các tài liệu có tính chất tương tự.</p>
  </div>

  <nav class="chapter-nav">
    <a href="chuong-1136.html" class="nav-btn ">← Chương trước</a>
    <a href="index.html" class="nav-home">📚 Mục lục</a>
    <a href="chuong-1138.html" class="nav-btn ">Chương sau →</a>
  </nav>
</div>

<script>
function setFontSize(v)    { document.documentElement.style.setProperty('--reader-font-size',   v+'px'); }
function setLineHeight(v)  { document.documentElement.style.setProperty('--reader-line-height', v/100); }
function setWidth(v)       { document.documentElement.style.setProperty('--reader-max-width',   v+'px'); }
function setTheme(t)       { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); }

// Restore preferences
(function() {
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  const fs = localStorage.getItem('fontSize');
  const lh = localStorage.getItem('lineHeight');
  const mw = localStorage.getItem('maxWidth');
  if (fs) { setFontSize(fs);     document.querySelectorAll('input[type=range]')[0].value = fs; }
  if (lh) { setLineHeight(lh);   document.querySelectorAll('input[type=range]')[1].value = lh; }
  if (mw) { setWidth(mw);        document.querySelectorAll('input[type=range]')[2].value = mw; }
})();

// Save on change
document.querySelectorAll('input[type=range]').forEach((el, i) => {
  el.addEventListener('input', () => {
    const keys = ['fontSize','lineHeight','maxWidth'];
    localStorage.setItem(keys[i], el.value);
  });
});

// Reading progress bar
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const pct = doc.scrollTop / (doc.scrollHeight - doc.clientHeight) * 100;
  document.getElementById('progress').style.width = pct + '%';
});
</script>
</body>
</html>
